<!--
  D-Bus policy granting BLE (org.bluez) access to non-root users.
  Install on the HOST as: /etc/dbus-1/system.d/node-ble.conf  then: sudo systemctl reload dbus

  Needed when the process using node-ble is NOT root. The Homebridge container
  (homebridge/homebridge image) runs the bridge as root by default, in which case
  BlueZ's default policy already allows it and this file is unnecessary. Add a
  <policy user="..."> block matching the UID the bridge actually runs as if you set PUID.
-->
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="aziz">
    <allow send_destination="org.bluez"/>
    <allow send_interface="org.bluez.Adapter1"/>
    <allow send_interface="org.bluez.Device1"/>
    <allow send_interface="org.bluez.GattService1"/>
    <allow send_interface="org.bluez.GattCharacteristic1"/>
    <allow send_interface="org.bluez.GattDescriptor1"/>
    <allow send_interface="org.freedesktop.DBus.ObjectManager"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
  </policy>
</busconfig>
